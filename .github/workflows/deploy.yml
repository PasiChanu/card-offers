name: Daily Scrape & Deploy

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: |
          npm install puppeteer
          npx puppeteer browsers install chrome

      - name: Scrape all banks
        run: node scraper/scrape.js
        timeout-minutes: 25
        continue-on-error: true

      - name: Build index.html
        run: |
          node - << 'JS'
          const fs = require('fs');

          // All paths are relative to the repo root (process.cwd())
          const offersFile   = 'scraper/offers.json';
          const templateFile = 'index.template.html';
          const outputFile   = 'index.html';

          if (!fs.existsSync(offersFile)) {
            console.log('No offers.json — keeping existing index.html');
            process.exit(0);
          }
          if (!fs.existsSync(templateFile)) {
            console.error('index.template.html missing from repo root!');
            process.exit(1);
          }

          let offers = JSON.parse(fs.readFileSync(offersFile, 'utf8'));
          console.log('Offers loaded:', offers.length);

          function clean(s) {
            return String(s||'').replace(/\\/g,'\\\\').replace(/`/g,"'").replace(/\${/g,'\\${').slice(0,500);
          }

          offers = offers.map((o,i) => ({
            id: i+1,
            bank:   clean(o.bank   || 'Unknown'),
            cat:    clean(o.cat    || 'Other'),
            title:  clean(o.title  || 'Offer'),
            desc:   clean(o.desc   || ''),
            disc:   clean(o.disc   || 'Special offer'),
            expiry: o.expiry || '2026-12-31',
            url:    clean(o.url    || '')
          }));

          const seedJS = 'const SEED=[\n' +
            offers.map(o =>
              '  {id:'+o.id+
              ',bank:'+JSON.stringify(o.bank)+
              ',cat:'+JSON.stringify(o.cat)+
              ',title:'+JSON.stringify(o.title)+
              ',desc:'+JSON.stringify(o.desc)+
              ',disc:'+JSON.stringify(o.disc)+
              ',expiry:'+JSON.stringify(o.expiry)+
              ',url:'+JSON.stringify(o.url)+'}'
            ).join(',\n') + '\n];';

          let html = fs.readFileSync(templateFile, 'utf8');
          html = html.replace(/const SEED=\[[\s\S]*?\];/, seedJS);

          const now = new Date().toLocaleDateString('en-GB', {day:'numeric',month:'long',year:'numeric'});
          html = html.replace(/\{\{LAST_UPDATED\}\}/g, now);

          fs.writeFileSync(outputFile, html);
          console.log('index.html built with', offers.length, 'offers. Date:', now);
          JS

      - name: Commit changes
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add index.html
          [ -f scraper/offers.json ] && git add scraper/offers.json || true
          git diff --staged --quiet || git commit -m "bot: daily update $(date +'%Y-%m-%d')"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
