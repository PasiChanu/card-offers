<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Offers</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .offers-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .offer-card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; }
        .offer-card h3 { margin-top: 0; }
        .expiry { color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>Card Offers</h1>
    <p>Last updated: {{LAST_UPDATED}}</p>
    
    <script>
        const SEED=[];
    </script>
    
    <div class="offers-container" id="offers"></div>
    
    <script>
        const container = document.getElementById('offers');
        SEED.forEach(offer => {
            const card = document.createElement('div');
            card.className = 'offer-card';
            card.innerHTML = `
                <h3>${offer.bank} - ${offer.title}</h3>
                <p><strong>${offer.disc}</strong></p>
                <p>${offer.desc}</p>
                <p class="expiry">Expires: ${offer.expiry}</p>
                <a href="${offer.url}" target="_blank">View Offer</a>
            `;
            container.appendChild(card);
        });
    </script>
</body>
</html>
